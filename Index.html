<!DOCTYPE htmi>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Comic Universe</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            color: #ff0055;
        }
        /* Your first interactive twitching button */
        .twitch-button {
            background: #ffcc00;
            color: black;
            border: 3px solid black;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        @keyframes twitch {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2px, -2px) rotate(2deg); }
            50% { transform: translate(-2px, 2px) rotate(-2deg); }
            75% { transform: translate(1px, 2px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .twitch-button:hover {
            animation: twitch 0.15s infinite;
            background: #ff0055;
            color: white;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Comic Site</h1>
    <p>Biographies and artwork are cooking...</p>
    
    <!-- Test your button hover effect here -->
    <button class="twitch-button">Enter Universe</button>

</body>
</html>
